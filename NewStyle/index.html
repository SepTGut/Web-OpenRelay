<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRelay NewStyle</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#f59e0b'
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#07090f] text-white overflow-x-hidden">

  <div class="bg-grid"></div>

  <header class="sticky top-0 z-50 backdrop-blur-xl border-b border-white/10 bg-black/30">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">OpenRelay</h1>
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm text-zinc-300">
        <a href="#" class="hover:text-primary transition">Home</a>
        <a href="#" class="hover:text-primary transition">Features</a>
        <a href="#" class="hover:text-primary transition">Docs</a>
        <a href="#" class="hover:text-primary transition">Team</a>
      </nav>

      <button class="px-5 py-2 rounded-xl bg-primary text-black font-semibold hover:scale-105 transition">
        Dashboard
      </button>
    </div>
  </header>

  <main>

    <section class="relative min-h-screen flex items-center justify-center px-6">
      <div class="max-w-5xl mx-auto text-center relative z-10">

        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-primary/30 bg-primary/10 text-primary text-sm mb-8">
          <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
          FIKSI 2026 • SMKN 1 Madiun
        </div>

        <h1 class="text-5xl md:text-7xl font-black tracking-tight leading-none">
          Future Relay
          <span class="text-primary block">Automation</span>
        </h1>

        <p class="max-w-2xl mx-auto mt-8 text-zinc-400 text-lg leading-8">
          OpenRelay is an ESP32-based open-source relay ecosystem with MQTT,
          Web Dashboard, REST API, and WLED-compatible architecture.
        </p>

        <div class="mt-10 flex flex-wrap justify-center gap-4">
          <button class="px-8 py-4 rounded-2xl bg-primary text-black font-bold hover:scale-105 transition">
            Open Dashboard
          </button>

          <button class="px-8 py-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 transition">
            Explore Features
          </button>
        </div>

        <div class="mt-16 grid grid-cols-2 md:grid-cols-4 gap-5">

          <div class="glass-card p-6 rounded-3xl">
            <div class="text-4xl font-black text-primary">128</div>
            <div class="text-zinc-400 mt-2">Relay Channel</div>
          </div>

          <div class="glass-card p-6 rounded-3xl">
            <div class="text-4xl font-black text-primary">ESP32</div>
            <div class="text-zinc-400 mt-2">Platform</div>
          </div>

          <div class="glass-card p-6 rounded-3xl">
            <div class="text-4xl font-black text-primary">MQTT</div>
            <div class="text-zinc-400 mt-2">Protocol</div>
          </div>

          <div class="glass-card p-6 rounded-3xl">
            <div class="text-4xl font-black text-primary">OTA</div>
            <div class="text-zinc-400 mt-2">Updates</div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
